<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synapse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            min-height: 180px;
            background-color: #1a1a1a;
            color: #e8e8e8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
        }

        /* Navbar */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #383838;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 15px;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background-color: #0d9488;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            color: white;
        }

        /* content area */
        .content {
            padding: 16px;
        }

        /* not logged in state */
        .not-logged-in {
            text-align: center;
            padding: 20px 0;
        }

        .not-logged-in p {
            color: #a0a0a0;
            font-size: 13px;
            margin-bottom: 12px;
        }

        /* page info */
        .page-title {
            font-size: 13px;
            color: #a0a0a0;
            margin-bottom: 4px;
        }

        .page-name {
            font-size: 14px;
            font-weight: 500;
            color: #e8e8e8;
            margin-bottom: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* status message */
        .status {
            font-size: 12px;
            margin-top: 10px;
            min-height: 18px;
            color: #a0a0a0;
        }

        .status.success {
            color: #0d9488;
        }

        .status.error {
            color: #f87171;
        }

        /* buttons */
        button {
            width: 100%;
            padding: 9px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background-color: #0d9488;
            color: white;
        }

        .btn-primary:hover {
            background-color: #0f766e;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: #2a2a2a;
            color: #e8e8e8;
            border: 1px solid #383838;
        }

        .btn-secondary:hover {
            background-color: #333333;
        }
    </style>
</head>

<body>

    <!-- navbar -->
    <div class="navbar">
        <div class="logo">
            <div class="logo-icon">S</div>
            Synapse
        </div>
    </div>

    <!-- content -->
    <div class="content">

        <!-- not logged in — by default hidden -->
        <div id="not-logged-in" class="not-logged-in" style="display:none">
            <p>Login to Synapse to save pages</p>
            <button class="btn-secondary" id="open-synapse">Open Synapse</button>
        </div>

        <!-- logged in state — by default hidden -->
        <div id="logged-in" style="display:none">
            <p class="page-title">Current page</p>
            <p class="page-name" id="page-title">Loading...</p>
            <button class="btn-primary" id="save-btn">Save to Synapse</button>
            <p class="status" id="status"></p>
        </div>

        <!-- loading state — shown by default -->
        <div id="loading" style="text-align:center; padding: 30px 0">
            <p style="color: #666; font-size: 13px">Loading...</p>
        </div>

    </div>

    <script src="popup.js"></script>
</body>

</html>
